const svgCache = {};
function qrSVG(text, size){
  const k=size+'|'+text; if(svgCache[k]) return svgCache[k];
  const qr=qrcode(0,'M'); qr.addData(text); qr.make();
  const n=qr.getModuleCount(), cell=size/n; let rects='';
  for(let r=0;r<n;r++)for(let c=0;c<n;c++)if(qr.isDark(r,c))
    rects+='<rect x="'+(c*cell).toFixed(2)+'" y="'+(r*cell).toFixed(2)+'" width="'+cell.toFixed(2)+'" height="'+cell.toFixed(2)+'"/>';
  const s='<svg viewBox="0 0 '+size+' '+size+'" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges"><rect width="'+size+'" height="'+size+'" fill="#fff"/><g fill="#000">'+rects+'</g></svg>';
  svgCache[k]=s; return s;
}
function visual(d,size){
  if(d.link) return qrSVG(d.link,size);
  if(d.img)  return '<img src="qr/'+d.img+'" alt="'+d.name+'">';
  return '<div style="color:#aaa;font-size:12px;padding-top:40%">QR 준비중</div>';
}
function qrCanvas(text,scale,margin){
  const qr=qrcode(0,'M'); qr.addData(text); qr.make();
  const n=qr.getModuleCount(), size=(n+margin*2)*scale;
  const cv=document.createElement('canvas'); cv.width=cv.height=size;
  const x=cv.getContext('2d'); x.fillStyle='#fff'; x.fillRect(0,0,size,size); x.fillStyle='#000';
  for(let r=0;r<n;r++)for(let c=0;c<n;c++)if(qr.isDark(r,c)) x.fillRect((c+margin)*scale,(r+margin)*scale,scale,scale);
  return cv;
}
function saveQR(i){
  const d=DATA[i], fname=d.name.replace(/[\\/:*?"<>|]/g,'_')+'_QR.png';
  const a=document.createElement('a'); a.download=fname;
  if(d.link){ a.href=qrCanvas(d.link,10,4).toDataURL('image/png'); }
  else if(d.img){ a.href='qr/'+d.img; }
  else { toast('QR 준비중'); return; }
  document.body.appendChild(a); a.click(); a.remove(); toast('QR 저장됨');
}

function plan(filter,kw){
  const groups=[];
  const match=d=>(d.name+' '+(d.region||'')+' '+(d.address||'')).toLowerCase().includes(kw);
  if(filter==='all'||filter==='지점'){
    const BUCKETS=[["서울",["서울"]],["경기",["경기"]],["인천",["인천"]],["부산",["부산"]],["대구·울산·경남·광주",["대구","울산","경남","광주"]],["제주",["제주"]]];
    BUCKETS.forEach(([label,regs])=>{
      let items=DATA.filter(d=>d.type==='지점'&&regs.includes(d.region)&&match(d));
      if(label==='서울') items=items.slice().sort((a,b)=>{
        const d=SEOUL_ORDER.indexOf(a.gu)-SEOUL_ORDER.indexOf(b.gu);
        return d||a.name.localeCompare(b.name,'ko');
      });
      if(items.length) groups.push({label:'📍 '+label,color:COLORS[regs[0]]||'#888',items});
    });
    const noreg=DATA.filter(d=>d.type==='지점'&&!REGION_ORDER.includes(d.region)&&match(d));
    if(noreg.length) groups.push({label:'📍 기타지역',color:'#888',items:noreg});
  }
  [['에이전시','🤝 에이전시'],['MTO','💱 MTO'],['기타','📌 기타']].forEach(([t,lab])=>{
    if(filter==='all'||filter===t){
      const items=DATA.filter(d=>d.type===t&&match(d));
      if(items.length) groups.push({label:lab,color:COLORS[t]||'#888',items});
    }
  });
  return groups;
}

let filter='all', kw='';
const list=document.getElementById('list');
function render(){

      const card=document.createElement('div'); card.className='card'; card.style.setProperty('--c',cc);
      card.innerHTML=

        '</div>'+
        (d.link?'<a class="open" href="'+d.link+'" target="_blank" rel="noopener">🔗 송금 링크 열기</a>':'');
      grid.appendChild(card);
    });
    list.appendChild(grid);
  });
}
